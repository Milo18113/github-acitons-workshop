name: Mi primer CI

# trigger job on:
on: 
  push:
  pull_request:

# Jobs: Con una misma tubería de CI se pueden validar múltiples configuraciones 
# de entornos de ejecución
jobs:
  test:
    # Imagen del runner
    runs-on: ubuntu-latest

    # Para correr diferentes versiones de python
    strategy: 
      matrix: 
        python-version: ["3.10", "3.13"]
      
    # Acciones, una por una
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v5
        with: 
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest